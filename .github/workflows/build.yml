name: Build & Package

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Extract version
        shell: pwsh
        run: |
          if ("$env:GITHUB_REF" -match "^refs/tags/v(.+)$") {
            $version = $Matches[1]
          } else {
            $content = Get-Content CMakeLists.txt -Raw
            if ($content -match 'project\(SimpleMarkdown\s+VERSION\s+([0-9.]+)') {
              $version = $Matches[1]
            } else {
              $version = "0.1.0"
            }
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "Building version: $version"

      - name: Collect dist files
        shell: pwsh
        run: |
          $dist = "installer/dist"
          if (Test-Path $dist) { Remove-Item -Recurse -Force $dist }
          New-Item -ItemType Directory -Force -Path "$dist/platforms","$dist/imageformats","$dist/styles" | Out-Null

          # Qt5_DIR points to lib/cmake/Qt5, resolve Qt root
          $qtRoot = (Resolve-Path "$env:Qt5_DIR/../../..").Path
          if (-not (Test-Path "$qtRoot/bin/Qt5Core.dll")) {
            $qtRoot = (Resolve-Path "$env:Qt5_DIR/../..").Path
          }
          if (-not (Test-Path "$qtRoot/bin/Qt5Core.dll")) {
            $search = $env:Qt5_DIR
            for ($i = 0; $i -lt 5; $i++) {
              $search = Split-Path $search -Parent
              if (Test-Path "$search/bin/Qt5Core.dll") { $qtRoot = $search; break }
            }
          }
          if (-not (Test-Path "$qtRoot/bin/Qt5Core.dll")) {
            Write-Host "::error::Cannot find Qt bin directory. Qt5_DIR=$env:Qt5_DIR"
            exit 1
          }
          $qtBin = "$qtRoot/bin"
          $qtPlugins = "$qtRoot/plugins"
          Write-Host "Qt root: $qtRoot"
          Write-Host "Qt bin: $qtBin"
          Write-Host "Qt plugins: $qtPlugins"

          # Copy exe
          Copy-Item "build/app/Release/SimpleMarkdown.exe" "$dist/"

          # Copy Qt DLLs
          foreach ($dll in @("Qt5Core","Qt5Gui","Qt5Widgets","Qt5Network","Qt5Svg")) {
            $path = "$qtBin/$dll.dll"
            if (Test-Path $path) { Copy-Item $path "$dist/" }
          }

          # Copy ANGLE/OpenGL
          foreach ($dll in @("libEGL","libGLESv2","D3Dcompiler_47","opengl32sw")) {
            $path = "$qtBin/$dll.dll"
            if (Test-Path $path) { Copy-Item $path "$dist/" }
          }

          # Copy MSVC runtime from Qt bin (if present)
          foreach ($dll in @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","concrt140.dll")) {
            $path = "$qtBin/$dll"
            if (Test-Path $path) { Copy-Item $path "$dist/" }
          }

          # Copy Qt plugins
          Copy-Item "$qtPlugins/platforms/qwindows.dll" "$dist/platforms/"
          foreach ($fmt in @("qjpeg","qgif","qico","qsvg","qwebp","qtiff")) {
            $path = "$qtPlugins/imageformats/$fmt.dll"
            if (Test-Path $path) { Copy-Item $path "$dist/imageformats/" }
          }
          $vistaStyle = "$qtPlugins/styles/qwindowsvistastyle.dll"
          if (Test-Path $vistaStyle) { Copy-Item $vistaStyle "$dist/styles/" }

          $count = (Get-ChildItem -Recurse "$dist" -File).Count
          Write-Host "Collected $count files"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $nsi = "installer/SimpleMarkdown.nsi"
          (Get-Content $nsi) -replace '!define APP_VERSION ".*"', "!define APP_VERSION `"$env:VERSION`"" | Set-Content $nsi
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { $makensis = "$env:ProgramFiles\NSIS\makensis.exe" }
          cd installer
          & $makensis SimpleMarkdown.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SimpleMarkdown-${{ env.VERSION }}-Setup
          path: installer/SimpleMarkdown-*-Setup.exe

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "installer/dist/*" -DestinationPath "installer/SimpleMarkdown-$env:VERSION-Portable.zip"

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: SimpleMarkdown-${{ env.VERSION }}-Windows-Portable
          path: installer/SimpleMarkdown-*-Portable.zip

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^[^(]*(\([^)]*\)).*/\1/p' debian/changelog | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper cmake qtbase5-dev libqt5svg5-dev \
            fakeroot dpkg-dev librsvg2-bin

      - name: Generate PNG icons from SVG
        run: |
          cd resources
          for size in 16 24 32 48 128 256 512; do
            rsvg-convert -w $size -h $size app-icon.svg -o simplemarkdown_${size}.png
          done

      - name: Build DEB package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../simplemarkdown_*.deb dist/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplemarkdown_${{ steps.version.outputs.version }}_amd64
          path: dist/*.deb

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*-Setup.exe
            artifacts/**/*-Portable.zip
            artifacts/**/*.deb
          generate_release_notes: true
